<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Nexus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #08080f; --bg-mid: #0e0e1a; --bg-light: #161625;
            --accent: #c084fc; --accent-hover: #d8b4fe;
            --text: #e4e0ed; --text-dim: #9690a8; --text-muted: #5c5872;
            --border: #2a2545; --success: #6ee7b7; --error: #fca5a5;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column;
        }
        .header {
            background: var(--bg-mid); padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
        }
        .header h1 { color: var(--accent); font-size: 1.3em; font-weight: normal; }
        .header-buttons { display: flex; gap: 8px; }
        .header-btn {
            background: var(--bg-light); color: var(--text-dim);
            border: 1px solid var(--border); padding: 6px 12px;
            border-radius: 6px; font-size: 0.85em; cursor: pointer; transition: all 0.2s;
        }
        .header-btn:hover { background: var(--border); color: var(--text); }

        .chat-container {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .message {
            max-width: 85%; padding: 12px 16px; border-radius: 12px;
            line-height: 1.6; font-size: 1em; white-space: pre-wrap; word-wrap: break-word;
        }
        .message.user { background: var(--bg-light); align-self: flex-end; border: 1px solid var(--border); }
        .message.assistant { background: var(--bg-mid); align-self: flex-start; border: 1px solid var(--border); }
        .message-role { font-size: 0.75em; font-weight: bold; margin-bottom: 6px; }
        .message.user .message-role { color: var(--text-dim); }
        .message.assistant .message-role { color: var(--accent); }
        .message-content { color: var(--text); }

        .welcome { text-align: center; padding: 60px 20px; color: var(--text-dim); }
        .welcome h2 { color: var(--accent); font-size: 1.8em; margin-bottom: 16px; font-weight: normal; }

        .input-area { background: var(--bg-mid); padding: 16px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
        .input-container { display: flex; gap: 10px; max-width: 900px; margin: 0 auto; }
        .input-wrapper { flex: 1; position: relative; }
        #message-input {
            width: 100%; background: var(--bg-light); border: 1px solid var(--border);
            color: var(--text); padding: 12px 16px; border-radius: 12px;
            font-family: inherit; font-size: 1em; resize: none;
            min-height: 48px; max-height: 150px; line-height: 1.5;
        }
        #message-input:focus { outline: none; border-color: var(--accent); }
        #message-input::placeholder { color: var(--text-muted); }
        #send-btn {
            background: linear-gradient(135deg, #7c3aed 0%, #c084fc 100%);
            color: white; border: none; padding: 12px 24px; border-radius: 12px;
            font-weight: 600; cursor: pointer; font-size: 1em; transition: background 0.2s; align-self: flex-end;
        }
        #send-btn:hover { background: var(--accent-hover); }
        #send-btn:disabled { background: var(--text-muted); cursor: not-allowed; }

        .status { text-align: center; font-size: 0.8em; color: var(--text-muted); margin-top: 8px; }
        .status.error { color: var(--error); }
        .status.success { color: var(--success); }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 100;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-mid); border: 1px solid var(--border);
            border-radius: 12px; padding: 24px; max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto;
        }
        .modal h3 { color: var(--accent); margin-bottom: 16px; font-weight: normal; }
        .modal label { display: block; color: var(--text-dim); margin-bottom: 6px; font-size: 0.9em; }
        .modal input, .modal select {
            width: 100%; background: var(--bg-light); border: 1px solid var(--border);
            color: var(--text); padding: 10px 12px; border-radius: 8px; font-size: 1em; margin-bottom: 16px;
        }
        .modal input:focus, .modal select:focus { outline: none; border-color: var(--accent); }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .modal-btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 0.95em; border: none; }
        .modal-btn.primary { background: var(--accent); color: var(--bg-dark); }
        .modal-btn.secondary { background: var(--bg-light); color: var(--text); border: 1px solid var(--border); }

        .sessions-list { max-height: 200px; overflow-y: auto; margin-bottom: 16px; }
        .session-item {
            padding: 10px 12px; background: var(--bg-light); border: 1px solid var(--border);
            border-radius: 6px; margin-bottom: 8px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .session-item:hover { border-color: var(--accent); }
        .session-item .name { color: var(--text); }
        .session-item .date { color: var(--text-muted); font-size: 0.8em; }
        .session-item .delete-btn { color: var(--error); background: none; border: none; cursor: pointer; padding: 4px 8px; font-size: 1.1em; }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.1em; }
            .header-btn { padding: 6px 10px; font-size: 0.8em; }
            .message { max-width: 95%; font-size: 0.95em; }
            .chat-container { padding: 12px; }
            .input-area { padding: 12px; }
            #send-btn { padding: 12px 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>✦ The Nexus</h1>
        <div class="header-buttons">
            <button class="header-btn" onclick="showCharacterSheet()">📋 Sheet</button>
            <button class="header-btn" onclick="showSettings()">⚙ Settings</button>
            <button class="header-btn" onclick="showSessions()">📁 Sessions</button>
            <button class="header-btn" onclick="newSession()">✦ New</button>
        </div>
    </div>

    <div class="chat-container" id="chat-container">
        <div class="welcome">
            <h2>The Nexus Awaits</h2>
            <p>Your framework is loaded and ready.<br>Type "Begin" to start a new session.</p>
        </div>
    </div>

    <div class="input-area">
        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="message-input" placeholder="Enter your action..." rows="1"></textarea>
            </div>
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
        <div class="status" id="status">Loading framework...</div>
    </div>

    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h3>Settings</h3>
            <label>Provider</label>
            <select id="provider-select" onchange="onProviderChange()">
                <option value="anthropic">Anthropic (Claude)</option>
                <option value="google">Google AI (Gemini)</option>
                <option value="openai">OpenAI (ChatGPT)</option>
            </select>
            <div id="anthropic-key-section"><label>Anthropic API Key</label><input type="password" id="api-key-input" placeholder="sk-ant-..."></div>
            <div id="google-key-section" style="display:none;"><label>Google AI Studio API Key</label><input type="password" id="google-api-key-input" placeholder="AIza..."></div>
            <div id="openai-key-section" style="display:none;"><label>OpenAI API Key</label><input type="password" id="openai-api-key-input" placeholder="sk-..."></div>
            <label>Model</label>
            <select id="model-select">
                <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (Balanced)</option>
                <option value="claude-opus-4-6">Claude Opus 4.6 (Best)</option>
                <option value="claude-opus-4-5">Claude Opus 4.5</option>
                <option value="claude-sonnet-4-5-20250929">Claude Sonnet 4.5</option>
                <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (Fast)</option>
            </select>
            <label>Temperature: <span id="temp-display">1.0</span></label>
            <input type="range" id="temp-slider" min="0" max="1.0" step="0.05" value="1.0" oninput="updateTempDisplay()">
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="closeSettings()">Cancel</button>
                <button class="modal-btn primary" onclick="saveSettings()">Save</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="sessions-modal">
        <div class="modal">
            <h3>Sessions</h3>
            <div class="sessions-list" id="sessions-list"><p style="color: var(--text-muted);">No saved sessions yet.</p></div>
            <div style="display: flex; gap: 8px; margin-bottom: 16px;">
                <button class="modal-btn secondary" style="flex:1" onclick="loadFromFile()">📂 Open File</button>
                <button class="modal-btn secondary" style="flex:1" onclick="saveToFile()">💾 Download</button>
            </div>
            <label>Save to browser as:</label>
            <input type="text" id="session-name-input" placeholder="Session name...">
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="closeSessions()">Close</button>
                <button class="modal-btn primary" onclick="saveSession()">Save to Browser</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="character-sheet-modal">
        <div class="modal" style="max-width: 700px;">
            <h3>📋 Character Sheet</h3>
            <p style="color: var(--text-dim); font-size: 0.9em; margin-bottom: 12px;">View and edit your persistent character sheet.</p>
            <textarea id="character-sheet-editor" style="
                width: 100%; min-height: 350px; max-height: 55vh;
                background: var(--bg-light); border: 1px solid var(--border);
                color: var(--text); padding: 12px; border-radius: 8px;
                font-size: 0.9em; font-family: inherit; line-height: 1.6; resize: vertical;
            " placeholder="No character sheet yet."></textarea>
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="clearCharacterSheet()">Clear</button>
                <button class="modal-btn secondary" onclick="closeCharacterSheet()">Cancel</button>
                <button class="modal-btn primary" onclick="saveCharacterSheet()">Save</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // NEXUS FRAMEWORK — Loaded from external file
        // ============================================================
        let NEXUS_FRAMEWORK = '';
        let frameworkLoaded = false;

        fetch('framework.txt')
            .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
            .then(text => { NEXUS_FRAMEWORK = text; frameworkLoaded = true; setStatus('Ready'); console.log(`Framework loaded: ${(text.length/1024).toFixed(1)} KB`); })
            .catch(err => { console.error('Failed to load framework.txt:', err); setStatus('Framework not found — place framework.txt in same directory', 'error'); frameworkLoaded = true; });

        // ============================================================
        // STATE
        // ============================================================
        let messages = [];
        let characterSheet = '';
        let isGenerating = false;
        let abortController = null;

        // ============================================================
        // SETTINGS
        // ============================================================
        function getProvider() { return localStorage.getItem('nexus_provider') || 'anthropic'; }
        function getApiKey() { return localStorage.getItem('nexus_api_key') || ''; }
        function getGoogleApiKey() { return localStorage.getItem('nexus_google_api_key') || ''; }
        function getOpenaiApiKey() { return localStorage.getItem('nexus_openai_api_key') || ''; }
        function getModel() { return localStorage.getItem('nexus_model') || 'claude-sonnet-4-6'; }
        function getTemperature() { return parseFloat(localStorage.getItem('nexus_temperature') || '1.0'); }
        
        function onProviderChange() {
            const provider = document.getElementById('provider-select').value;
            const ms = document.getElementById('model-select');
            document.getElementById('anthropic-key-section').style.display = 'none';
            document.getElementById('google-key-section').style.display = 'none';
            document.getElementById('openai-key-section').style.display = 'none';
            if (provider === 'anthropic') {
                document.getElementById('anthropic-key-section').style.display = 'block';
                ms.innerHTML = '<option value="claude-sonnet-4-6">Claude Sonnet 4.6</option><option value="claude-opus-4-6">Claude Opus 4.6</option><option value="claude-opus-4-5">Claude Opus 4.5</option><option value="claude-sonnet-4-5-20250929">Claude Sonnet 4.5</option><option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>';
            } else if (provider === 'google') {
                document.getElementById('google-key-section').style.display = 'block';
                ms.innerHTML = '<option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option><option value="gemini-3-pro-preview">Gemini 3 Pro</option><option value="gemini-3-flash-preview">Gemini 3 Flash</option><option value="gemini-2.5-pro">Gemini 2.5 Pro</option><option value="gemini-2.5-flash">Gemini 2.5 Flash</option><option value="gemini-2.0-flash">Gemini 2.0 Flash</option>';
            } else if (provider === 'openai') {
                document.getElementById('openai-key-section').style.display = 'block';
                ms.innerHTML = '<option value="gpt-5.2">GPT-5.2 Thinking</option><option value="gpt-5.2-chat-latest">GPT-5.2 Instant</option><option value="gpt-5-mini">GPT-5 Mini</option><option value="gpt-4o">GPT-4o</option><option value="gpt-4o-mini">GPT-4o Mini</option>';
            }
        }

        function showSettings() {
            document.getElementById('provider-select').value = getProvider();
            document.getElementById('api-key-input').value = getApiKey();
            document.getElementById('google-api-key-input').value = getGoogleApiKey();
            document.getElementById('openai-api-key-input').value = getOpenaiApiKey();
            document.getElementById('temp-slider').value = getTemperature();
            onProviderChange();
            document.getElementById('model-select').value = getModel();
            updateTempDisplay();
            document.getElementById('settings-modal').classList.add('active');
        }
        function closeSettings() { document.getElementById('settings-modal').classList.remove('active'); }
        function saveSettings() {
            const p = document.getElementById('provider-select').value;
            localStorage.setItem('nexus_provider', p);
            const k = document.getElementById('api-key-input').value.trim(); if (k) localStorage.setItem('nexus_api_key', k);
            const gk = document.getElementById('google-api-key-input').value.trim(); if (gk) localStorage.setItem('nexus_google_api_key', gk);
            const ok = document.getElementById('openai-api-key-input').value.trim(); if (ok) localStorage.setItem('nexus_openai_api_key', ok);
            localStorage.setItem('nexus_model', document.getElementById('model-select').value);
            localStorage.setItem('nexus_temperature', document.getElementById('temp-slider').value);
            closeSettings(); setStatus('Settings saved', 'success');
        }
        function updateTempDisplay() { document.getElementById('temp-display').textContent = parseFloat(document.getElementById('temp-slider').value).toFixed(1); }

        // ============================================================
        // CHARACTER SHEET
        // ============================================================
        function showCharacterSheet() { document.getElementById('character-sheet-editor').value = characterSheet || ''; document.getElementById('character-sheet-modal').classList.add('active'); }
        function closeCharacterSheet() { document.getElementById('character-sheet-modal').classList.remove('active'); }
        function saveCharacterSheet() { characterSheet = document.getElementById('character-sheet-editor').value; closeCharacterSheet(); setStatus('Character sheet updated', 'success'); }
        function clearCharacterSheet() { if (confirm('Clear character sheet?')) { document.getElementById('character-sheet-editor').value = ''; characterSheet = ''; closeCharacterSheet(); } }

        // ============================================================
        // SESSIONS
        // ============================================================
        function getSessions() { return JSON.parse(localStorage.getItem('nexus_sessions') || '{}'); }
        function showSessions() {
            const sessions = getSessions(); const list = document.getElementById('sessions-list');
            let html = '';
            if (Object.keys(sessions).length > 0) {
                html = Object.entries(sessions).sort((a,b) => new Date(b[1].date) - new Date(a[1].date))
                    .map(([n,d]) => `<div class="session-item" onclick="loadSession('${n}')"><div><div class="name">${n}</div><div class="date">${new Date(d.date).toLocaleDateString()}</div></div><button class="delete-btn" onclick="event.stopPropagation(); deleteSession('${n}')">×</button></div>`).join('');
            }
            list.innerHTML = html || '<p style="color: var(--text-muted);">No sessions yet.</p>';
            document.getElementById('sessions-modal').classList.add('active');
        }
        function closeSessions() { document.getElementById('sessions-modal').classList.remove('active'); }
        function saveSession() {
            const name = document.getElementById('session-name-input').value.trim();
            if (!name) { alert('Enter a name.'); return; }
            if (!messages.length) { alert('No messages.'); return; }
            const s = getSessions(); s[name] = { date: new Date().toISOString(), messages, character_sheet: characterSheet };
            localStorage.setItem('nexus_sessions', JSON.stringify(s));
            document.getElementById('session-name-input').value = ''; showSessions(); setStatus(`Saved: ${name}`, 'success');
        }
        function loadSession(name) {
            const s = getSessions();
            if (s[name]) { messages = s[name].messages; characterSheet = s[name].character_sheet || ''; renderMessages(); closeSessions(); setStatus(`Loaded: ${name}`, 'success'); }
        }
        function deleteSession(name) { if (confirm(`Delete "${name}"?`)) { const s = getSessions(); delete s[name]; localStorage.setItem('nexus_sessions', JSON.stringify(s)); showSessions(); } }

        function loadFromFile() {
            const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
            input.onchange = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                try {
                    const data = JSON.parse(await file.text());
                    if (data.messages && Array.isArray(data.messages)) { messages = data.messages; characterSheet = data.character_sheet || ''; renderMessages(); closeSessions(); setStatus(`Loaded: ${file.name}`, 'success'); }
                    else throw new Error('Invalid format');
                } catch (err) { alert('Failed: ' + err.message); }
            }; input.click();
        }

        function saveToFile() {
            if (!messages.length) { alert('No messages.'); return; }
            const name = document.getElementById('session-name-input').value.trim() || 'session';
            const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            const fn = `${name}_${ts}.json`;
            const data = { version: "1.0", created: new Date().toISOString(), provider: getProvider(), model: getModel(), temperature: getTemperature(), messages, character_sheet: characterSheet };
            const json = JSON.stringify(data, null, 2);
            if (navigator.share && navigator.canShare) {
                for (const mime of ['application/json', 'application/octet-stream', 'text/plain']) {
                    try { const f = new File([json], fn, {type: mime}); if (navigator.canShare({files:[f]})) { navigator.share({files:[f], title:'Nexus'}).then(()=>setStatus(`Saved: ${fn}`,'success')).catch(e=>{if(e.name!=='AbortError') _fb(json,fn);}); return; } } catch(e) { continue; }
                }
            }
            _fb(json, fn);
        }
        function _fb(json, fn) {
            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                try { const w = window.open('data:application/octet-stream;charset=utf-8,' + encodeURIComponent(json), '_blank'); if (!w) { navigator.clipboard.writeText(json).then(() => { alert(`Copied. Save as "${fn}"`); }); } } catch(e) { alert('Use Save to Browser.'); }
            } else {
                const b = new Blob([json], {type:'application/json'}); const u = URL.createObjectURL(b);
                const a = document.createElement('a'); a.href = u; a.download = fn; document.body.appendChild(a); a.click(); document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(u), 100); setStatus(`Downloaded: ${fn}`, 'success');
            }
        }

        function newSession() {
            if (messages.length > 0 && !confirm('New session? Unsaved progress lost.')) return;
            messages = [];
            if (characterSheet && !confirm('Keep character sheet?')) characterSheet = '';
            renderMessages(); setStatus('New session started');
        }

        // ============================================================
        // CHAT
        // ============================================================
        function renderMessages() {
            const c = document.getElementById('chat-container');
            if (!messages.length) { c.innerHTML = '<div class="welcome"><h2>The Nexus Awaits</h2><p>Your framework is loaded and ready.<br>Type "Begin" to start a new session.</p></div>'; return; }
            c.innerHTML = messages.map(m => `<div class="message ${m.role}"><div class="message-role">${m.role==='user'?'You':'The Nexus'}</div><div class="message-content">${escapeHtml(m.content)}</div></div>`).join('');
            scrollToBottom();
        }
        function addMessage(role, content) {
            const c = document.getElementById('chat-container');
            const w = c.querySelector('.welcome'); if (w) w.remove();
            const d = document.createElement('div'); d.className = `message ${role}`;
            d.innerHTML = `<div class="message-role">${role==='user'?'You':'The Nexus'}</div><div class="message-content">${escapeHtml(content)}</div>`;
            c.appendChild(d); scrollToBottom(); return d;
        }
        function updateLastMessage(content) { const ms = document.querySelectorAll('.message.assistant'); const l = ms[ms.length-1]; if (l) { l.querySelector('.message-content').textContent = content; scrollToBottom(); } }
        function scrollToBottom() { const c = document.getElementById('chat-container'); c.scrollTop = c.scrollHeight; }
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function setStatus(t, type='') { const s = document.getElementById('status'); s.textContent = t; s.className = 'status ' + type; }

        // ============================================================
        // API
        // ============================================================
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            if (!content || isGenerating) return;
            if (!frameworkLoaded) { setStatus('Framework loading...', 'error'); return; }
            const provider = getProvider();
            const apiKey = provider === 'anthropic' ? getApiKey() : provider === 'google' ? getGoogleApiKey() : getOpenaiApiKey();
            if (!apiKey) { showSettings(); alert('Set your API key first.'); return; }

            messages.push({ role: 'user', content }); addMessage('user', content);
            input.value = ''; input.style.height = 'auto';
            isGenerating = true;
            document.getElementById('send-btn').disabled = true;
            document.getElementById('send-btn').textContent = 'Stop';
            document.getElementById('send-btn').onclick = stopGeneration;
            setStatus('Generating...'); addMessage('assistant', '▌');
            abortController = new AbortController();

            try {
                let systemPrompt = NEXUS_FRAMEWORK;
                if (characterSheet) systemPrompt += '\n\n' + '='.repeat(60) + '\nPERSISTENT CHARACTER SHEET & CONTINUITY LOG\n' + '='.repeat(60) + '\n\n' + characterSheet;

                let fullContent = '';

                if (provider === 'anthropic') {
                    const r = await fetch('https://api.anthropic.com/v1/messages', { method:'POST', headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'}, body:JSON.stringify({model:getModel(),max_tokens:12288,temperature:getTemperature(),system:systemPrompt,messages:messages.filter(m=>m.role!=='system'),stream:true}), signal:abortController.signal });
                    if (!r.ok) throw new Error((await r.json()).error?.message || `API Error: ${r.status}`);
                    const reader = r.body.getReader(); const dec = new TextDecoder();
                    while (true) { const {done,value} = await reader.read(); if (done) break; for (const line of dec.decode(value).split('\n')) { if (line.startsWith('data: ')&&line.slice(6)!=='[DONE]') { try { const p=JSON.parse(line.slice(6)); if(p.type==='content_block_delta'&&p.delta?.text){fullContent+=p.delta.text;updateLastMessage(fullContent+'▌');} }catch(e){} } } }
                } else if (provider === 'google') {
                    const gc = []; for (const m of messages.slice(0,-1)) gc.push({role:m.role==='user'?'user':'model',parts:[{text:m.content}]}); gc.push({role:'user',parts:[{text:messages[messages.length-1].content}]});
                    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${getModel()}:streamGenerateContent?alt=sse&key=${apiKey}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({contents:gc,systemInstruction:{parts:[{text:systemPrompt}]},generationConfig:{temperature:getTemperature(),maxOutputTokens:12288}}), signal:abortController.signal });
                    if (!r.ok) throw new Error((await r.json()).error?.message || `API Error: ${r.status}`);
                    const reader = r.body.getReader(); const dec = new TextDecoder();
                    while (true) { const {done,value} = await reader.read(); if (done) break; for (const line of dec.decode(value).split('\n')) { if (line.startsWith('data: ')) { try { const p=JSON.parse(line.slice(6)); if(p.candidates?.[0]?.content?.parts?.[0]?.text){fullContent+=p.candidates[0].content.parts[0].text;updateLastMessage(fullContent+'▌');} }catch(e){} } } }
                } else if (provider === 'openai') {
                    const om = [{role:'system',content:systemPrompt}]; for (const m of messages) om.push({role:m.role,content:m.content});
                    const r = await fetch('https://api.openai.com/v1/chat/completions', { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`}, body:JSON.stringify({model:getModel(),max_completion_tokens:12288,temperature:getTemperature(),messages:om,stream:true}), signal:abortController.signal });
                    if (!r.ok) throw new Error((await r.json().catch(()=>({}))).error?.message || `API Error: ${r.status}`);
                    const reader = r.body.getReader(); const dec = new TextDecoder();
                    while (true) { const {done,value} = await reader.read(); if (done) break; for (const line of dec.decode(value).split('\n')) { if (line.startsWith('data: ')&&line.slice(6)!=='[DONE]') { try { const p=JSON.parse(line.slice(6)); if(p.choices?.[0]?.delta?.content){fullContent+=p.choices[0].delta.content;updateLastMessage(fullContent+'▌');} }catch(e){} } } }
                }

                messages.push({ role: 'assistant', content: fullContent }); updateLastMessage(fullContent); setStatus('Ready', 'success');
            } catch (error) {
                if (error.name === 'AbortError') setStatus('Stopped', '');
                else { console.error(error); setStatus(`Error: ${error.message}`, 'error'); const l = document.querySelector('.message.assistant:last-child'); if (l&&l.querySelector('.message-content').textContent==='▌') l.remove(); messages.pop(); }
            } finally {
                isGenerating = false; document.getElementById('send-btn').disabled = false;
                document.getElementById('send-btn').textContent = 'Send'; document.getElementById('send-btn').onclick = sendMessage; abortController = null;
            }
        }
        function stopGeneration() { if (abortController) abortController.abort(); }

        // Input handling
        const input = document.getElementById('message-input');
        input.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 150) + 'px'; });
        input.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

        if (!getApiKey() && !getGoogleApiKey() && !getOpenaiApiKey()) setTimeout(() => { if (frameworkLoaded) setStatus('Set your API key in Settings', 'error'); }, 1500);
    </script>
</body>
</html>
